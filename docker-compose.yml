version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: homespace-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: homespace_model
      MYSQL_USER: homespace_user
      MYSQL_PASSWORD: homespace_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - homespace-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homespace-backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: homespace_user
      DB_PASSWORD: homespace_pass
      DB_NAME: homespace_model
      JWT_SECRET: homespace_super_secret_jwt_key_change_in_production_2024
      JWT_EXPIRE: 7d
      NODE_ENV: development
      PORT: 5001
      FRONTEND_URL: http://localhost:3000
      MAX_FILE_SIZE: 10485760
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    networks:
      - homespace-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: homespace-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001/api
      NEXT_PUBLIC_APP_NAME: HomeSpace
    depends_on:
      - backend
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - homespace-net

volumes:
  mysql_data:
  uploads_data:

networks:
  homespace-net:
    driver: bridge
